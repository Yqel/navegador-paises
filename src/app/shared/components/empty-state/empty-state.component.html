<section class="empty-state" role="status" aria-live="polite">
  <mat-icon class="empty-state__icon" aria-hidden="true">{{ icon }}</mat-icon>

  <h2 class="empty-state__title">{{ title }}</h2>

  @if (subtitle) {
    <p class="empty-state__subtitle">{{ subtitle }}</p>
  }

  <!-- Slot para botones de acción opcionales -->
  <div class="empty-state__actions">
    <ng-content />
  </div>
</section>
