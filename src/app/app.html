<mat-toolbar color="primary" class="navbar">
  <a routerLink="/paises" class="brand" aria-label="Ir al inicio">
    <mat-icon aria-hidden="true">public</mat-icon>
    <span>Navegador de Pa&#237;ses</span>
  </a>

  <span class="spacer"></span>

  <nav>
    <a
      mat-button
      routerLink="/paises"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: false }"
      aria-label="Lista de pa&#237;ses"
    >
      <mat-icon>list</mat-icon>
      Pa&#237;ses
    </a>

    <a
      mat-button
      routerLink="/favoritos"
      routerLinkActive="active-link"
      aria-label="Mis favoritos"
    >
      <mat-icon
        [matBadge]="favoritesService.count() > 0 ? favoritesService.count().toString() : null"
        matBadgeColor="warn"
        matBadgeSize="small"
      >favorite</mat-icon>
      Favoritos
    </a>
  </nav>
</mat-toolbar>

<main>
  <router-outlet />
</main>
